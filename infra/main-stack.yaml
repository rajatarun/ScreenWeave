AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ScreenWeave – unified stack.
  All infrastructure in one template; no bucket parameters required.
  Deploy with: sam build && sam deploy --resolve-s3

# ─────────────────────────────────────────────────────────────────────────────
# Parameters  (all have defaults — zero required inputs)
# ─────────────────────────────────────────────────────────────────────────────
Parameters:

  CrawlerAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AL2023 AMI for EC2 crawler workers (resolved from SSM at deploy time).

  CrawlerInstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.small, t3.medium, t3.large]

  SignedUrlExpiresSeconds:
    Type: Number
    Default: 3600
    MinValue: 300
    MaxValue: 43200
    Description: Pre-signed S3 URL TTL in seconds.

# ─────────────────────────────────────────────────────────────────────────────
# Globals (apply to all AWS::Serverless::Function resources)
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 29
    MemorySize: 512
    Tracing: Active

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── S3: Playwright session artifacts ───────────────────────────────────────
  # Stores screenshots, states.json, transitions.json, trace.zip per session.
  # Name auto-generated by CloudFormation (globally unique).
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldSessions
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: ScreenWeave

  # ── S3: Crawler code (crawl.py downloaded by EC2 workers at boot) ───────────
  # Versioning enabled so rollbacks are possible without redeploying.
  CrawlerCodeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: ScreenWeave

  # ── DynamoDB: session metadata index ───────────────────────────────────────
  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-sessions'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: ScreenWeave

  # ── DynamoDB: perceptual hash cache ────────────────────────────────────────
  # Stores Bedrock interpretation results keyed by image dHash (16-char hex).
  # TTL of 72h auto-expires stale entries. Reduces vision API calls by 40–60%
  # for recurring dashboard/UI states (Principle 3: Smart Caching).
  ScreenweaveCacheTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub '${AWS::StackName}-phash-cache'
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: phash
          AttributeType: S
      KeySchema:
        - AttributeName: phash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: ScreenWeave

  # ── IAM: McpServer Lambda execution role ────────────────────────────────────
  McpServerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-mcp-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem]
                Resource: !GetAtt SessionsTable.Arn
        - PolicyName: S3ArtifactAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt ArtifactsBucket.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${ArtifactsBucket.Arn}/*'
        - PolicyName: EC2CrawlerLaunch
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [ec2:RunInstances, ec2:CreateTags]
                Resource: '*'
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CrawlerInstanceRole.Arn

  # ── IAM: EC2 crawler instance role ─────────────────────────────────────────
  CrawlerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-crawler-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CrawlerPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${ArtifactsBucket.Arn}/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt ArtifactsBucket.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${CrawlerCodeBucket.Arn}/crawler/*'
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:UpdateItem]
                Resource: !GetAtt SessionsTable.Arn
              - Effect: Allow
                Action: ec2:TerminateInstances
                Resource: '*'

  CrawlerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-crawler-profile'
      Roles:
        - !Ref CrawlerInstanceRole

  # ── IAM: VisualQA Trigger Lambda execution role ─────────────────────────────
  # Needs only lambda:InvokeFunction on the Worker so it can fire it async.
  VisualQATriggerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-visualqa-trigger-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvokeWorker
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt VisualQAWorkerFunction.Arn

  # ── IAM: VisualQA Worker Lambda execution role ──────────────────────────────
  # S3 read (screenshots + states.json) + S3 write (report) + Bedrock InvokeModel.
  VisualQAWorkerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-visualqa-worker-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: S3ArtifactAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt ArtifactsBucket.Arn
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject]
                Resource: !Sub '${ArtifactsBucket.Arn}/*'
        - PolicyName: CacheTableAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem]
                Resource: !GetAtt ScreenweaveCacheTable.Arn
        - PolicyName: BedrockInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  # Sonnet 4 — Tier 3 (complex reasoning, consolidation)
                  - !Sub 'arn:aws:bedrock:*::foundation-model/anthropic.claude-sonnet-4-20250514-v1:0'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-sonnet-4-20250514-v1:0'
                  # Haiku 3 — Tier 2 (routine batches, supports vision, ~3× cheaper than Sonnet)
                  - !Sub 'arn:aws:bedrock:*::foundation-model/anthropic.claude-3-haiku-20240307-v1:0'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-3-haiku-20240307-v1:0'

  CrawlerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ScreenWeave crawler EC2 - egress only, no inbound
      Tags:
        - Key: Project
          Value: ScreenWeave

  # ── Lambda: MCP server ──────────────────────────────────────────────────────
  # AWS::Serverless::Function is expanded to AWS::Lambda::Function by the SAM
  # transform. CodeUri is resolved and packaged by `sam build`.
  McpServerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-mcp'
      RetentionInDays: 30

  McpServerFunction:
    Type: AWS::Serverless::Function
    DependsOn: McpServerLogGroup
    Properties:
      FunctionName: !Sub '${AWS::StackName}-mcp'
      Description: >
        ScreenWeave MCP server. Implements MCP JSON-RPC 2.0 over HTTP.
        Tools: crawl_url, get_session_status, get_screenshots, get_metrics, get_full_session.
      CodeUri: ../src/lambda/mcpServer/
      Handler: index.handler
      Role: !GetAtt McpServerRole.Arn
      ReservedConcurrentExecutions: 50
      Environment:
        Variables:
          SESSIONS_TABLE:               !Ref SessionsTable
          ARTIFACTS_BUCKET:             !Ref ArtifactsBucket
          BUCKET_PREFIX:                screenweave
          CRAWLER_AMI_ID:               !Ref CrawlerAmiId
          CRAWLER_SG_ID:                !Ref CrawlerSecurityGroup
          CRAWLER_INSTANCE_PROFILE_ARN: !GetAtt CrawlerInstanceProfile.Arn
          CRAWLER_INSTANCE_TYPE:        !Ref CrawlerInstanceType
          CRAWLER_CODE_BUCKET:          !Ref CrawlerCodeBucket
          SIGNED_URL_EXPIRES_SECONDS:   !Ref SignedUrlExpiresSeconds
      Events:
        PostMcp:
          Type: HttpApi
          Properties:
            Path: /mcp
            Method: POST
            ApiId: !Ref McpHttpApi
        GetMcp:
          Type: HttpApi
          Properties:
            Path: /mcp
            Method: GET
            ApiId: !Ref McpHttpApi
      Tags:
        Project: ScreenWeave

  # ── Lambda: VisualQA Trigger ────────────────────────────────────────────────
  # Sync entry-point (≤10s). Validates session_id, fires Worker asynchronously,
  # returns 202 immediately so the REST API call never blocks on Claude.
  VisualQATriggerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-visualqa-trigger'
      RetentionInDays: 30

  VisualQATriggerFunction:
    Type: AWS::Serverless::Function
    DependsOn: VisualQATriggerLogGroup
    Properties:
      FunctionName: !Sub '${AWS::StackName}-visualqa-trigger'
      Description: >
        ScreenWeave Visual QA trigger. Validates session_id and fires the
        VisualQA-Worker Lambda asynchronously; returns 202 immediately.
      CodeUri: ../src/lambda/visualQATrigger/
      Handler: handler.handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 256
      Tracing: PassThrough
      Role: !GetAtt VisualQATriggerRole.Arn
      Environment:
        Variables:
          ARTIFACTS_BUCKET:     !Ref ArtifactsBucket
          BUCKET_PREFIX:        screenweave
          WORKER_FUNCTION_NAME: VisualQA-Worker
      Events:
        PostVisualQA:
          Type: Api
          Properties:
            Path: /visual-qa
            Method: POST
            RestApiId: !Ref VisualQAApi
      Tags:
        Project: ScreenWeave

  # ── Lambda: VisualQA Worker ─────────────────────────────────────────────────
  # Async, long-running (up to 900s). Downloads screenshots from S3, runs a
  # multi-turn Bedrock conversation with shared context across all batches,
  # then writes qa_report.json back to S3.
  VisualQAWorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-visualqa-worker'
      RetentionInDays: 30

  VisualQAWorkerFunction:
    Type: AWS::Serverless::Function
    DependsOn: VisualQAWorkerLogGroup
    Properties:
      FunctionName: VisualQA-Worker
      Description: >
        ScreenWeave Visual QA worker. Downloads screenshots, drives a multi-turn
        Claude 3.5 Sonnet conversation via Bedrock with shared context across
        batches, writes qa_report.json to S3.
      CodeUri: ../src/lambda/visualQAWorker/
      Handler: handler.handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 3008
      Tracing: Active
      Role: !GetAtt VisualQAWorkerRole.Arn
      Environment:
        Variables:
          ARTIFACTS_BUCKET:     !Ref ArtifactsBucket
          BUCKET_PREFIX:        screenweave
          CACHE_TABLE:          !Ref ScreenweaveCacheTable
          HAIKU_MODEL_ID:       us.anthropic.claude-3-haiku-20240307-v1:0
          ROUTING_ENABLED:      "true"
          CACHE_ENABLED:        "true"
          MAX_TOKENS_PER_IMAGE: "5000"
      Tags:
        Project: ScreenWeave

  # ── API Gateway v1: Visual QA REST API ─────────────────────────────────────
  # Separate from the MCP HTTP API. Stage v1 gives versioned URLs.
  VisualQAApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Description: ScreenWeave Visual QA REST API — POST /visual-qa to start a QA job
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'content-type'"
        AllowMethods: "'POST,OPTIONS'"
      Tags:
        Project: ScreenWeave

  # ── API Gateway v2: HTTP API ────────────────────────────────────────────────
  # $default stage → URL has no stage prefix: https://{id}.execute-api.{region}.amazonaws.com/mcp
  McpApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}-mcp'
      RetentionInDays: 30

  McpHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - GET
          - OPTIONS
        AllowHeaders:
          - content-type
          - accept
        MaxAge: 300
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 25
      AccessLogSettings:
        DestinationArn: !GetAtt McpApiLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId",
          "ip":"$context.identity.sourceIp",
          "requestTime":"$context.requestTime",
          "routeKey":"$context.routeKey",
          "status":"$context.status",
          "responseLatency":"$context.responseLatency",
          "integrationLatency":"$context.integrationLatency"}
      Tags:
        Project: ScreenWeave

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:

  McpEndpoint:
    Description: >
      MCP server URL — the only value MCP clients need.
      No AWS credentials required.
    Value: !Sub 'https://${McpHttpApi}.execute-api.${AWS::Region}.amazonaws.com/mcp'
    Export:
      Name: !Sub '${AWS::StackName}-McpEndpoint'

  McpClientConfig:
    Description: Ready-to-paste MCP client configuration
    Value: !Sub >-
      {"mcpServers":{"screenweave":{"url":"https://${McpHttpApi}.execute-api.${AWS::Region}.amazonaws.com/mcp"}}}

  ArtifactsBucketName:
    Description: S3 bucket storing Playwright session artifacts
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ArtifactsBucket'

  CrawlerCodeBucketName:
    Description: S3 bucket storing crawler scripts (crawl.py). Upload after deploy.
    Value: !Ref CrawlerCodeBucket
    Export:
      Name: !Sub '${AWS::StackName}-CrawlerCodeBucket'

  SessionsTableName:
    Description: DynamoDB session index table
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${AWS::StackName}-SessionsTable'

  VisualQAEndpoint:
    Description: >
      Visual QA REST API — POST {"session_id": "..."} to start a QA job.
      Returns 202 immediately; poll the report_s3_key for results.
    Value: !Sub 'https://${VisualQAApi}.execute-api.${AWS::Region}.amazonaws.com/v1/visual-qa'
    Export:
      Name: !Sub '${AWS::StackName}-VisualQAEndpoint'

  VisualQAWorkerFunctionName:
    Description: VisualQA Worker Lambda function name
    Value: !Ref VisualQAWorkerFunction
    Export:
      Name: !Sub '${AWS::StackName}-VisualQAWorkerFunction'
