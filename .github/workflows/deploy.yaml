name: Deploy ScreenWeave

on:
  push:
    branches: [main]
    paths:
      - 'src/lambda/mcpServer/**'
      - 'src/crawler/crawl.py'
      - 'infra/main-stack.yaml'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

# id-token: write  → request OIDC JWT, exchanged for short-lived STS creds
# contents: read   → checkout
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGION: us-east-1
  BUCKET_PREFIX: screenweave
  STACK_NAME: screenweave
  FN_NAME: screenweave-mcp
  ZIP_NAME: mcpServer.zip

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Assumes the role via OIDC — no long-lived AWS keys in secrets.
      # Set ASSUME_ROLE_ARN in: Settings → Secrets and variables → Variables
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.REGION }}
          mask-aws-account-id: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/lambda/mcpServer/package.json

      - name: Build mcpServer Lambda
        run: |
          cd src/lambda/mcpServer && npm ci --omit=dev --prefer-offline
          mkdir -p "$GITHUB_WORKSPACE/.build"
          (cd src/lambda/mcpServer && zip -qr "$GITHUB_WORKSPACE/.build/$ZIP_NAME" . \
            --exclude "*.test.mjs" --exclude "*.test.js" --exclude "*.md")
          echo "ZIP: $(du -sh "$GITHUB_WORKSPACE/.build/$ZIP_NAME" | cut -f1)"

      - name: Upload Lambda ZIP + crawl.py to S3
        run: |
          aws s3 cp ".build/$ZIP_NAME" \
            "s3://${{ vars.CODE_BUCKET }}/$BUCKET_PREFIX/lambda/$ZIP_NAME" \
            --region "$REGION" --sse AES256
          aws s3 cp src/crawler/crawl.py \
            "s3://${{ vars.CODE_BUCKET }}/$BUCKET_PREFIX/crawler/crawl.py" \
            --region "$REGION" --sse AES256

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --region "$REGION" \
            --template-file infra/main-stack.yaml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides \
              "ArtifactsBucket=${{ vars.ARTIFACTS_BUCKET }}" \
              "BucketPrefix=$BUCKET_PREFIX" \
              "LambdaCodeBucket=${{ vars.CODE_BUCKET }}" \
              "LambdaCodeKey=$BUCKET_PREFIX/lambda/$ZIP_NAME" \
              "SignedUrlExpiresSeconds=3600" \
              "Environment=prod" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # CFN won't re-deploy Lambda when only the S3 object content changes.
      # Explicit update-function-code ensures the latest ZIP is always live.
      - name: Force Lambda code refresh
        run: |
          aws lambda update-function-code \
            --region "$REGION" \
            --function-name "$FN_NAME" \
            --s3-bucket "${{ vars.CODE_BUCKET }}" \
            --s3-key "$BUCKET_PREFIX/lambda/$ZIP_NAME" \
            --query "FunctionArn" --output text
          aws lambda wait function-updated \
            --region "$REGION" --function-name "$FN_NAME"

      - name: Smoke-test and print MCP endpoint
        run: |
          MCP_ENDPOINT=$(aws cloudformation describe-stacks \
            --region "$REGION" \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='McpEndpoint'].OutputValue" \
            --output text)

          HTTP_STATUS=$(curl -s -o /tmp/mcp_resp.json -w "%{http_code}" \
            -X POST \
            -H 'content-type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            "$MCP_ENDPOINT")

          cat /tmp/mcp_resp.json
          [[ "$HTTP_STATUS" == "200" ]] || { echo "Smoke-test failed: HTTP $HTTP_STATUS"; exit 1; }

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## ScreenWeave deployed

          | | |
          |---|---|
          | **MCP Endpoint** | \`$MCP_ENDPOINT\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Actor** | @${{ github.actor }} |

          \`\`\`json
          {"mcpServers":{"screenweave":{"url":"$MCP_ENDPOINT"}}}
          \`\`\`
          SUMMARY
