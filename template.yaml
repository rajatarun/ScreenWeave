AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ScreenWeave – Playwright crawler. Crawls a target URL, captures structured
  visual states/transitions/trace, and uploads all artifacts to S3 under a
  unique session folder ready for the ScreenWeave retrieval API.

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket to receive all artifacts.

  S3Prefix:
    Type: String
    Default: screenweave
    Description: >
      Root S3 key prefix. Artifacts land at {S3Prefix}/{session_id}/.
      Set this to the same value as BUCKET_PREFIX in the retrieval API stack
      (infra/api-stack.yaml) so the Lambda can locate them.

  TargetURL:
    Type: String
    Default: https://tarunraja.info

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.small, t3.medium, t3.large]

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:

  # ── IAM ───────────────────────────────────────────────────────────────────
  VideoGenRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-VideoGenRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ArtifactUpload
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Write all session artifacts
              - Effect: Allow
                Action: [s3:PutObject]
                Resource: !Sub "arn:aws:s3:::${S3Bucket}/${S3Prefix}/*"
              # s3 sync needs ListBucket to detect what already exists
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource: !Sub "arn:aws:s3:::${S3Bucket}"
                Condition:
                  StringLike:
                    s3:prefix: !Sub "${S3Prefix}/*"
              # Self-terminate when done
              - Effect: Allow
                Action: [ec2:TerminateInstances]
                Resource: "*"

  VideoGenInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref VideoGenRole]

  VideoGenSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ScreenWeave crawler SG – egress only

  # ── EC2 crawler instance ───────────────────────────────────────────────────
  VideoGenInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId:      !Ref AmiId
      IamInstanceProfile: !Ref VideoGenInstanceProfile
      SecurityGroupIds: [!Ref VideoGenSG]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-crawler"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > /var/log/video-gen.log 2>&1

          REGION="${AWS::Region}"
          S3_BUCKET="${S3Bucket}"
          S3_PREFIX="${S3Prefix}"
          TARGET_URL="${TargetURL}"

          # IMDSv2-compatible instance ID
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-id)

          echo "START $(date)"
          echo "Instance : $INSTANCE_ID"
          echo "Target   : $TARGET_URL"
          echo "Bucket   : s3://$S3_BUCKET/$S3_PREFIX"

          # ── 1. System packages ─────────────────────────────────────────────
          dnf update -y
          dnf install -y python3-pip ImageMagick unzip tar xz

          # ffmpeg static binary (AL2023 has no ffmpeg package)
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            -o /tmp/ffmpeg.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          mv /tmp/ffmpeg-*-amd64-static/ffmpeg /usr/local/bin/ffmpeg
          chmod +x /usr/local/bin/ffmpeg
          ffmpeg -version | head -1

          # ── 2. Chromium runtime dependencies for AL2023 ────────────────────
          dnf install -y atk cups-libs gtk3 libXcomposite libXcursor libXdamage \
            libXext libXi libXrandr libXScrnSaver libXtst pango alsa-lib \
            at-spi2-atk at-spi2-core libdrm mesa-libgbm nss nspr \
            libxkbcommon libgbm xdg-utils

          # ── 3. Playwright ──────────────────────────────────────────────────
          pip3 install playwright
          python3 -m playwright install chromium

          # ── 4. Write crawler script ────────────────────────────────────────
          # Single-quoted 'PYEOF' prevents bash from expanding anything inside.
          # CloudFormation !Sub only replaces ${Param} patterns (with $),
          # so Python f-strings like {var} and {{escaped}} are written as-is.
          mkdir -p /opt/output/screenshots

          cat > /opt/crawl.py <<'PYEOF'
          import asyncio, json, os, re, subprocess, sys, uuid
          from datetime import datetime, timezone
          from urllib.parse import urlparse
          from playwright.async_api import async_playwright

          BASE_URL    = sys.argv[1]
          OUT_DIR     = "/opt/output"
          SCREENS_DIR = f"{OUT_DIR}/screenshots"
          TRACE_PATH  = f"{OUT_DIR}/trace.zip"
          SESSION_ID  = str(uuid.uuid4())
          MAX_DEPTH   = 2
          MAX_LINKS   = 12

          os.makedirs(SCREENS_DIR, exist_ok=True)

          seen        = set()
          states      = []
          transitions = []
          state_ctr   = [0]
          prev_state  = [None]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def slug(url):
              p = urlparse(url)
              path = p.path.strip("/").replace("/", "_") or "home"
              return re.sub(r"[^a-z0-9_-]", "", path.lower())[:40] or "home"

          def safe_label(text):
              t = text.encode("ascii", "ignore").decode()
              t = re.sub(r"[^a-z0-9 _-]", "", t.lower())
              t = re.sub(r"\s+", "-", t.strip())
              return t[:25] or "click"

          def internal(url):
              p = urlparse(url)
              if p.scheme not in ("http", "https"): return False
              return p.netloc == urlparse(BASE_URL).netloc

          async def scroll_page(page):
              total = await page.evaluate("document.body.scrollHeight")
              vh    = await page.evaluate("window.innerHeight")
              step  = max(vh // 3, 200)
              pos   = 0
              while pos < total:
                  await page.evaluate(f"window.scrollTo({{top:{pos},behavior:'smooth'}})")
                  await asyncio.sleep(0.15)
                  pos += step
              await page.evaluate("window.scrollTo({top:0,behavior:'smooth'})")
              await asyncio.sleep(0.3)

          async def wait_for_idle(page, timeout=5000):
              try:
                  await page.wait_for_load_state("networkidle", timeout=timeout)
              except Exception:
                  await asyncio.sleep(1.5)

          async def capture_state(page, trigger_action=None, trigger_label=None):
              state_ctr[0] += 1
              state_id  = f"state_{state_ctr[0]:04d}"
              ts        = now_iso()
              shot_path = f"{SCREENS_DIR}/{state_id}.png"

              await page.screenshot(path=shot_path, full_page=True)

              title = await page.title()
              url   = page.url

              try:
                  scroll_y = await page.evaluate("window.scrollY")
                  doc_h    = await page.evaluate("document.documentElement.scrollHeight")
                  headings = await page.eval_on_selector_all(
                      "h1,h2,h3",
                      "els => els.slice(0,10).map(e => ({tag:e.tagName.toLowerCase(),text:e.innerText.trim().slice(0,120)}))"
                  )
                  links = await page.eval_on_selector_all(
                      "a[href]",
                      "els => [...new Set(els.map(e=>e.href))].slice(0,25)"
                  )
                  preview = await page.evaluate(
                      "document.body ? document.body.innerText.slice(0,600) : ''"
                  )
                  interactive = await page.eval_on_selector_all(
                      "[role=button],[role=tab],button,summary",
                      "els => els.filter(e=>e.offsetParent!==null).slice(0,20).map(e=>e.innerText.trim().slice(0,60)).filter(t=>t.length>0)"
                  )
              except Exception:
                  scroll_y, doc_h, headings, links, preview, interactive = 0, 0, [], [], "", []

              state = {
                  "state_id":             state_id,
                  "url":                  url,
                  "title":                title,
                  "timestamp":            ts,
                  "screenshot":           f"screenshots/{state_id}.png",
                  "scroll_y":             scroll_y,
                  "document_height":      doc_h,
                  "trigger_action":       trigger_action,
                  "trigger_label":        trigger_label,
                  "headings":             headings,
                  "links_found":          links,
                  "interactive_elements": interactive,
                  "visible_text_preview": preview.strip(),
              }
              states.append(state)
              print(f"STATE {state_id} | {trigger_action} | {url} | {title!r}", flush=True)

              if prev_state[0] is not None:
                  transitions.append({
                      "from_state_id": prev_state[0]["state_id"],
                      "to_state_id":   state_id,
                      "action":        trigger_action or "navigation",
                      "trigger_label": trigger_label or "",
                      "from_url":      prev_state[0]["url"],
                      "to_url":        url,
                      "timestamp":     ts,
                  })

              prev_state[0] = state
              return state

          async def click_interactive(page):
              selectors = [
                  "[role=tab]",
                  "[role=button]:not([disabled])",
                  "button:not([disabled]):not([type=submit])",
                  "[data-tab],[data-toggle],[data-target]",
                  "details > summary",
                  "[aria-selected=false]",
                  "[aria-expanded=false]",
                  ".accordion-header,.accordion-toggle",
              ]
              clicked_labels = set()
              click_count    = 0
              for sel in selectors:
                  try:
                      elements = await page.query_selector_all(sel)
                      for el in elements[:8]:
                          try:
                              if not await el.is_visible(): continue
                              if not await el.bounding_box(): continue
                              raw_text = (await el.inner_text()).strip()
                              label    = safe_label(raw_text)
                              if not label or label in clicked_labels: continue
                              href = await el.get_attribute("href") or ""
                              if href and not href.startswith("#") and not href.startswith("javascript"):
                                  target = href if href.startswith("http") else BASE_URL.rstrip("/") + "/" + href.lstrip("/")
                                  if urlparse(target).netloc != urlparse(BASE_URL).netloc: continue
                                  if urlparse(target).path != urlparse(page.url).path: continue
                              clicked_labels.add(label)
                              print(f"  CLICK [{sel}] -> {label!r}", flush=True)
                              await el.scroll_into_view_if_needed()
                              await asyncio.sleep(0.2)
                              await el.click(timeout=3000)
                              await wait_for_idle(page, timeout=6000)
                              await asyncio.sleep(0.5)
                              await capture_state(page, trigger_action="click", trigger_label=label)
                              click_count += 1
                          except Exception as e:
                              print(f"  CLICK ERR: {e}", flush=True)
                  except Exception:
                      pass
              if click_count:
                  print(f"  Captured {click_count} click states on {page.url}", flush=True)

          async def crawl(page, url, depth):
              if url in seen or depth > MAX_DEPTH: return
              seen.add(url)
              if urlparse(url).netloc != urlparse(BASE_URL).netloc:
                  print(f"SKIP external {url}"); return
              print(f"\nPAGE [{depth}] {url}", flush=True)
              try:
                  await page.goto(url, wait_until="networkidle", timeout=25000)
                  if urlparse(page.url).netloc != urlparse(BASE_URL).netloc:
                      print(f"SKIP redirect {page.url}"); return
              except Exception as e:
                  print(f"ERR {e}"); return
              await asyncio.sleep(1)
              await capture_state(page, trigger_action="navigation", trigger_label=url)
              await scroll_page(page)
              await capture_state(page, trigger_action="scroll", trigger_label="scroll_to_bottom")
              await click_interactive(page)
              if depth < MAX_DEPTH:
                  hrefs = await page.eval_on_selector_all("a[href]", "els=>els.map(e=>e.href)")
                  kids  = list(dict.fromkeys([h for h in hrefs if internal(h) and h not in seen]))[:MAX_LINKS]
                  for k in kids:
                      await crawl(page, k, depth + 1)

          def card(path, l1, l2, l3=""):
              subprocess.run([
                  "convert","-size","1280x800","xc:#0d1117",
                  "-fill","#e6edf3","-font","DejaVu-Sans-Bold","-pointsize","56",
                  "-gravity","Center","-annotate","+0-80",l1,
                  "-fill","#58a6ff","-font","DejaVu-Sans","-pointsize","32",
                  "-gravity","Center","-annotate","+0+20",l2,
                  "-fill","#8b949e","-pointsize","22",
                  "-gravity","Center","-annotate","+0+100",l3,
                  path], capture_output=True)

          async def main():
              print(f"SESSION_ID : {SESSION_ID}", flush=True)
              print(f"BASE_URL   : {BASE_URL}",   flush=True)
              with open(f"{OUT_DIR}/.session_id", "w") as fh:
                  fh.write(SESSION_ID)
              card(f"{OUT_DIR}/0000_title.png","Tarun Raja",
                   "Senior Lead SWE - AI Systems Architect",
                   urlparse(BASE_URL).netloc)
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(headless=True)
                  ctx = await browser.new_context(
                      viewport={"width":1280,"height":800},
                      user_agent="Mozilla/5.0 Chrome/122")
                  await ctx.tracing.start(screenshots=True, snapshots=True, sources=False)
                  page = await ctx.new_page()
                  await crawl(page, BASE_URL, 0)
                  await ctx.tracing.stop(path=TRACE_PATH)
                  await browser.close()
              card(f"{OUT_DIR}/9999_outro.png",
                   urlparse(BASE_URL).netloc,
                   "Courses - Projects - AI Architecture",
                   "github.com/rajatarun")
              with open(f"{OUT_DIR}/states.json","w") as fh:
                  json.dump({"session_id":SESSION_ID,"base_url":BASE_URL,
                             "total_states":len(states),"captured_at":now_iso(),
                             "states":states}, fh, indent=2)
              with open(f"{OUT_DIR}/transitions.json","w") as fh:
                  json.dump({"session_id":SESSION_ID,
                             "total_transitions":len(transitions),
                             "transitions":transitions}, fh, indent=2)
              print(f"\nDONE | {len(states)} states | {len(transitions)} transitions | SESSION_ID={SESSION_ID}", flush=True)

          asyncio.run(main())
          PYEOF

          echo "Crawler written: $(wc -l /opt/crawl.py | awk '{print $1}') lines"

          # ── 5. Run crawler ─────────────────────────────────────────────────
          python3 /opt/crawl.py "$TARGET_URL"

          # Read the session ID the Python script persisted to disk
          SESSION_ID=$(cat /opt/output/.session_id)
          SESSION_S3="s3://$S3_BUCKET/$S3_PREFIX/$SESSION_ID"
          echo "SESSION_ID : $SESSION_ID"
          echo "Uploading to: $SESSION_S3"

          echo "Screenshots : $(ls /opt/output/screenshots/*.png 2>/dev/null | wc -l)"

          # ── 6. Upload session artifacts ────────────────────────────────────
          # states.json, transitions.json, trace.zip → flat in session folder
          aws s3 cp /opt/output/states.json      "$SESSION_S3/states.json"      --region "$REGION"
          aws s3 cp /opt/output/transitions.json "$SESSION_S3/transitions.json" --region "$REGION"
          aws s3 cp /opt/output/trace.zip        "$SESSION_S3/trace.zip"        --region "$REGION"

          # screenshots/ → sync preserves the sub-folder name
          aws s3 sync /opt/output/screenshots/   "$SESSION_S3/screenshots/"     --region "$REGION"

          # ── 7. Build video from captured screenshots ───────────────────────
          FRAMES_TXT="/opt/output/frames.txt"
          > "$FRAMES_TXT"

          # Intro card
          echo "file '/opt/output/0000_title.png'" >> "$FRAMES_TXT"
          echo "duration 4"                        >> "$FRAMES_TXT"

          # Screenshots in numeric order (sort -V handles state_1 … state_10 correctly)
          LAST_IMG=""
          for img in $(ls /opt/output/screenshots/state_*.png 2>/dev/null | sort -V); do
              echo "file '$(realpath "$img")'" >> "$FRAMES_TXT"
              echo "duration 4"               >> "$FRAMES_TXT"
              LAST_IMG="$img"
          done

          # Outro card + ffmpeg trailing duplicate (required by concat demuxer)
          echo "file '/opt/output/9999_outro.png'" >> "$FRAMES_TXT"
          echo "duration 4"                        >> "$FRAMES_TXT"
          echo "file '/opt/output/9999_outro.png'" >> "$FRAMES_TXT"

          echo "Frames in video: $(grep -c 'file ' "$FRAMES_TXT")"

          ffmpeg -y \
            -f concat -safe 0 -i "$FRAMES_TXT" \
            -vf "scale=1280:800:force_original_aspect_ratio=decrease,pad=1280:800:(ow-iw)/2:(oh-ih)/2:color=#0d1117,fps=30" \
            -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p \
            /opt/output/tarunraja_product_video.mp4

          echo "Video size: $(du -sh /opt/output/tarunraja_product_video.mp4)"

          # ── 8. Upload video and execution log ─────────────────────────────
          aws s3 cp /opt/output/tarunraja_product_video.mp4 \
            "$SESSION_S3/tarunraja_product_video.mp4" --region "$REGION"

          aws s3 cp /var/log/video-gen.log \
            "$SESSION_S3/video-gen.log" --region "$REGION"

          echo "UPLOAD DONE $(date)"
          echo "Artifacts at: $SESSION_S3"

          # ── 9. Self-terminate ──────────────────────────────────────────────
          aws ec2 terminate-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "$REGION"

Outputs:
  S3ArtifactRoot:
    Description: >
      S3 prefix root where all sessions land.
      Each session is at {S3ArtifactRoot}/{session_id}/ — the session_id
      is printed in the CloudWatch log and the video-gen.log artifact.
    Value: !Sub "s3://${S3Bucket}/${S3Prefix}/"

  VideoS3Path:
    Description: Approximate video path (session_id appended at runtime).
    Value: !Sub "s3://${S3Bucket}/${S3Prefix}/<session_id>/tarunraja_product_video.mp4"

  LogS3Path:
    Description: Approximate log path (session_id appended at runtime).
    Value: !Sub "s3://${S3Bucket}/${S3Prefix}/<session_id>/video-gen.log"

  WatchLogs:
    Value: !Sub "aws ssm start-session --target ${VideoGenInstance} --region ${AWS::Region}"
