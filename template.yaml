AWSTemplateFormatVersion: "2010-09-09"
Description: Crawls tarunraja.info with Playwright, stitches MP4, uploads to S3, self-terminates.

Parameters:
  S3Bucket:
    Type: String
  S3Prefix:
    Type: String
    Default: website-videos
  TargetURL:
    Type: String
    Default: https://tarunraja.info
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.small, t3.medium, t3.large]
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:

  VideoGenRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-VideoGenRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3Upload
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:PutObject]
                Resource: !Sub "arn:aws:s3:::${S3Bucket}/${S3Prefix}/*"
              - Effect: Allow
                Action: [ec2:TerminateInstances]
                Resource: "*"

  VideoGenInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref VideoGenRole]

  VideoGenSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Video gen SG, outbound only

  VideoGenInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref VideoGenInstanceProfile
      SecurityGroupIds: [!Ref VideoGenSG]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-video-gen"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > /var/log/video-gen.log 2>&1

          REGION="${AWS::Region}"
          S3_BUCKET="${S3Bucket}"
          S3_PREFIX="${S3Prefix}"
          TARGET_URL="${TargetURL}"
          # IMDSv2-compatible instance ID fetch
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-id)
          echo "Instance ID: $INSTANCE_ID" 

          echo "START $(date)"
          echo "Target: $TARGET_URL"
          echo "Bucket: $S3_BUCKET"

          # ── 1. Deps ──────────────────────────────────────────────────────
          dnf update -y
          dnf install -y python3-pip ImageMagick unzip tar xz

          # ffmpeg static binary - AL2023 has no ffmpeg in any repo
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o /tmp/ffmpeg.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          mv /tmp/ffmpeg-*-amd64-static/ffmpeg /usr/local/bin/ffmpeg
          chmod +x /usr/local/bin/ffmpeg
          ffmpeg -version | head -1

          # ── 2. Chromium deps for AL2023 (playwright install-deps uses apt, won't work here)
          dnf install -y atk cups-libs gtk3 libXcomposite libXcursor libXdamage \
            libXext libXi libXrandr libXScrnSaver libXtst pango alsa-lib \
            at-spi2-atk at-spi2-core libdrm mesa-libgbm nss nspr \
            libxkbcommon libgbm xdg-utils

          # ── 3. Playwright ────────────────────────────────────────────────
          pip3 install playwright
          python3 -m playwright install chromium

          # ── 3. Write Python crawler (base64-encoded to avoid heredoc issues) ──
          python3 - << 'ENCODE'
          import base64
          encoded = ""
          with open("/opt/crawl.b64","w") as f:
              f.write(encoded)
          ENCODE

          python3 -c "import base64; open('/opt/crawl.py','wb').write(base64.b64decode(open('/opt/crawl.b64').read()))"
          echo "Crawler written: $(wc -l /opt/crawl.py) lines"

          # ── 4. Run crawler ───────────────────────────────────────────────
          mkdir -p /opt/output/screens
          python3 /opt/crawl.py "$TARGET_URL"
          echo "Screenshots: $(ls /opt/output/screens/*.png 2>/dev/null | wc -l)"

          # ── 5. Build ffmpeg concat list ──────────────────────────────────
          FRAMES_TXT="/opt/output/frames.txt"
          > "$FRAMES_TXT"
          LAST=""
          for img in $(ls /opt/output/*.png /opt/output/screens/*.png 2>/dev/null | sort); do
              echo "file '$(realpath "$img")'" >> "$FRAMES_TXT"
              echo "duration 4"               >> "$FRAMES_TXT"
              LAST="$img"
          done
          echo "file '$(realpath "$LAST")'" >> "$FRAMES_TXT"

          echo "Frame count: $(grep -c 'file ' "$FRAMES_TXT")"

          # ── 6. Render video ──────────────────────────────────────────────
          ffmpeg -y \
            -f concat -safe 0 -i "$FRAMES_TXT" \
            -vf "scale=1280:800:force_original_aspect_ratio=decrease,pad=1280:800:(ow-iw)/2:(oh-ih)/2:color=#0d1117,fps=30" \
            -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p \
            /opt/output/tarunraja_product_video.mp4

          echo "Video size: $(du -sh /opt/output/tarunraja_product_video.mp4)"

          # ── 7. Upload ────────────────────────────────────────────────────
          aws s3 cp /opt/output/tarunraja_product_video.mp4 \
            "s3://$S3_BUCKET/$S3_PREFIX/tarunraja_product_video.mp4" \
            --region "$REGION"

          cd /opt/output && zip -r screens.zip screens/
          aws s3 cp /opt/output/screens.zip \
            "s3://$S3_BUCKET/$S3_PREFIX/screens.zip" \
            --region "$REGION"

          # Also upload the log itself for debugging
          aws s3 cp /var/log/video-gen.log \
            "s3://$S3_BUCKET/$S3_PREFIX/video-gen.log" \
            --region "$REGION"

          echo "UPLOAD DONE $(date)"

          # ── 8. Self-terminate ────────────────────────────────────────────
          aws ec2 terminate-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "$REGION"

Outputs:
  VideoS3Path:
    Value: !Sub "s3://${S3Bucket}/${S3Prefix}/tarunraja_product_video.mp4"
  LogS3Path:
    Value: !Sub "s3://${S3Bucket}/${S3Prefix}/video-gen.log"
  WatchLogs:
    Value: !Sub "aws ssm start-session --target ${VideoGenInstance} --region ${AWS::Region}"
